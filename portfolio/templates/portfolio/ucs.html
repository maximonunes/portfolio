{% extends 'portfolio/layout.html' %}

{% block content %}

<h1>Unidades Curriculares</h1>

<ul>
  {% for uc in ucs %}
    <li>
      <strong>{{ uc.nome }}</strong><br>
      Curso: {{ uc.curso.nome }}<br>
      Docente: {{ uc.docente_responsavel.nome }}<br>
      ECTS: {{ uc.ects }}
    </li>
  {% endfor %}
</ul>

{% endblock %}
