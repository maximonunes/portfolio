<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #121212; color: white; }
        header { background: #1f1f1f; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d14a96; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
        nav a:hover { color: #d14a96; }
        main { padding: 40px; min-height: 80vh; }
        footer { text-align: center; padding: 20px; background: #1f1f1f; color: #777; font-size: 0.8rem; }
        .btn { background: #d14a96; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <header>
        <h2>Meu Portfólio</h2>
        <nav>
            <a href="{% url 'portfolio:home' %}">Home</a>
            <a href="{% url 'portfolio:projetos' %}">Projetos</a>
            <a href="{% url 'portfolio:sobre' %}">Sobre</a>
            <a href="{% url 'portfolio:tecnologias' %}">Tecnologias</a>
            <a href="{% url 'portfolio:competencias' %}">Competências</a>
            <a href="{% url 'portfolio:formacoes' %}">Formação</a>
            <a href="{% url 'portfolio:makingof' %}">Making Of</a>

        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido em Django</p>
    </footer>

</body>
</html>
